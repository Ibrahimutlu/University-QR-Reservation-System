<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomLink | Scan QR</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page-bg"></div>
  <div id="nav-slot"></div>

  <main class="main-content">
    <section class="scanner-layout">
      <article class="scanner-card scanner-header reveal">
        <p class="section-label">QR Scanner</p>
        <h2>Scan Room or Reservation QR</h2>
        <p>
          Choose an action and scan a room sticker QR or a reservation QR payload.
          This screen is aligned with backend QR endpoints.
        </p>
      </article>

      <article class="scanner-card reveal delay-1">
        <div id="reader"></div>

        <div class="scan-controls">
          <div class="form-group">
            <label for="scanMode">Scan Action</label>
            <select id="scanMode">
              <option value="validate">Validate Access</option>
              <option value="checkin">Check In</option>
              <option value="checkout">Check Out</option>
            </select>
          </div>

          <div class="form-group">
            <label for="manual">Manual QR Input</label>
            <input id="manual" type="text" placeholder="ROOM-1-LAB101 or reservation JSON" />
          </div>
        </div>

        <div class="scanner-actions">
          <button id="start-btn" class="primary-btn" type="button">Start Camera</button>
          <button id="stop-btn" class="secondary-btn hidden" type="button">Stop Camera</button>
          <button id="manual-btn" class="secondary-btn" type="button">Run Manual Action</button>
        </div>
      </article>

      <article id="result" class="reveal delay-2"></article>
    </section>
  </main>

  <script>window.RRS_API_BASE = (["localhost","127.0.0.1"].includes(window.location.hostname) ? "http://localhost:5000" : window.location.origin);</script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/scan.js"></script>
</body>
</html>
