<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RoomLink — Scan QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="nav-slot"></div>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <header class="mb-6">
      <h1 class="text-2xl md:text-3xl font-bold text-slate-900">Scan QR code</h1>
      <p class="text-slate-500 text-sm">
        Point your camera at the door sticker (room QR) or a student's reservation QR.
      </p>
    </header>

    <div class="card p-5">
      <div id="reader" class="rounded-xl overflow-hidden"></div>
      <div class="flex flex-wrap gap-2 mt-4">
        <button id="start-btn"  class="btn-primary">Start camera</button>
        <button id="stop-btn"   class="btn-secondary hidden">Stop</button>

        <div class="ml-auto flex items-center gap-2">
          <span class="text-xs text-slate-500">Or test manually:</span>
          <input id="manual" type="text" placeholder="ROOM-1-LAB101" class="!w-56">
          <button id="manual-btn" class="btn-secondary">Validate</button>
        </div>
      </div>
    </div>

    <div id="result" class="mt-6"></div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/scan.js"></script>
</body>
</html>
