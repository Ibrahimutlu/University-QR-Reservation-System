<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomLink | Print Room QR</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page-bg"></div>
  <div id="nav-slot"></div>

  <main class="main-content">
    <section class="scanner-layout">
      <article id="loading" class="scanner-card reveal">Loading room QR...</article>

      <article class="sheet hidden print-only reveal" id="card">
        <p class="section-label">Door QR</p>
        <h1 id="title">Room Name</h1>
        <p class="meta"><span id="type"></span> | <span id="location"></span></p>

        <div class="qr">
          <img id="qr-img" alt="Door QR Code" />
        </div>

        <div class="code" id="code"></div>

        <p class="hint">
          Print and place this near the room entrance for check-in/check-out workflows.
        </p>

        <div class="actions">
          <button class="primary-btn" type="button" onclick="window.print()">Print</button>
          <button class="secondary-btn" type="button" onclick="window.history.back()">Back</button>
        </div>
      </article>

      <article id="error" class="card hidden reveal delay-1">
        <h2>Could not load QR</h2>
        <p id="error-msg" class="intro-text"></p>
        <div class="actions">
          <a href="rooms.html" class="primary-btn">Back to Rooms</a>
        </div>
      </article>
    </section>
  </main>

  <script>window.RRS_API_BASE = (["localhost","127.0.0.1"].includes(window.location.hostname) ? "http://localhost:5000" : "https://university-qr-reservation-system-production.up.railway.app");</script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/print-qr.js"></script>
</body>
</html>
