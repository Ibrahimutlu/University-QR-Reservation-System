<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RoomLink — Rooms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="nav-slot"></div>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <header class="flex flex-wrap items-end justify-between gap-3 mb-6">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-slate-900">Browse rooms</h1>
        <p class="text-slate-500 text-sm">Pick a room and reserve your slot.</p>
      </div>
      <div class="flex items-center gap-2">
        <input id="search" type="text" placeholder="Search rooms…" class="!w-64">
      </div>
    </header>

    <div id="rooms-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Loading skeleton -->
      <div class="card p-5 animate-pulse">
        <div class="h-4 bg-slate-200 rounded w-2/3 mb-3"></div>
        <div class="h-3 bg-slate-100 rounded w-1/2 mb-2"></div>
        <div class="h-3 bg-slate-100 rounded w-1/3"></div>
      </div>
    </div>
  </main>

  <!-- Booking modal -->
  <div id="modal-root"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
