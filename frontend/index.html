<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RoomLink — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="hero-gradient min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-3">
        <span class="brand-mark text-lg font-bold">R</span>
        <span class="text-xl font-bold text-slate-900">RoomLink</span>
      </div>
      <p class="text-sm text-slate-500">QR-Integrated University Room Reservation</p>
    </div>

    <!-- Login card -->
    <div class="card p-8">
      <h1 class="text-2xl font-semibold text-slate-900 mb-1">Welcome back</h1>
      <p class="text-sm text-slate-500 mb-6">Sign in with your university account.</p>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="email">Email address</label>
          <input id="email" type="email" required autocomplete="email"
                 placeholder="ahmed@university.com">
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" required autocomplete="current-password"
                 placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary w-full">
          <span id="submit-text">Sign in</span>
        </button>
      </form>

      <div id="error-box" class="hidden mt-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm"></div>
    </div>

    <!-- Demo accounts hint -->
    <div class="card p-5 mt-4">
      <p class="text-xs font-semibold text-slate-700 mb-3 uppercase tracking-wide">Demo accounts</p>
      <div class="space-y-2 text-xs text-slate-600">
        <div class="flex justify-between"><span>👨‍🎓 Student</span> <span class="font-mono">ahmed@university.com / 123456</span></div>
        <div class="flex justify-between"><span>👩‍💼 Staff</span>   <span class="font-mono">sara.staff@university.com / 123456</span></div>
        <div class="flex justify-between"><span>🛡️ Admin</span>      <span class="font-mono">admin@university.com / admin123</span></div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
