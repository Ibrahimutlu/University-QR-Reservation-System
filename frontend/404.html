<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RoomLink &mdash; Page not found</title>
  <link rel="icon" href="assets/roomlink-mark.svg" type="image/svg+xml" />
  <!-- GitHub Pages serves this file when a path doesn't match any file.
       Send the visitor back to the login flow so direct hits to deep URLs
       (e.g. /reserve.html on a fresh tab without auth) fall back gracefully. -->
  <meta http-equiv="refresh" content="0; url=login.html">
  <link rel="canonical" href="login.html">
  <script>window.location.replace("login.html");</script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:3rem">
    Page not found. Redirecting to <a href="login.html">login</a>&hellip;
  </p>
</body>
</html>
