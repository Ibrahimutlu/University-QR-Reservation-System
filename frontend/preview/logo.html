<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: center; }
  .left { display: flex; align-items: center; gap: 14px; }
  .badge { width: 72px; height: 72px; border-radius: 16px; background: #fff; border: 1px solid var(--accent-line); display: inline-flex; align-items: center; justify-content: center; padding: 4px; box-shadow: 0 18px 35px var(--accent-glow); }
  .badge img { width: 100%; height: 100%; object-fit: contain; border-radius: 12px; }
  .wm { font: 800 1.6rem/1 var(--font-sans); letter-spacing: var(--ls-tight); }
  .sub { font: var(--t-small); color: var(--muted); margin-top: 4px; }
  .right { background: #061214; color: #eafff7; padding: 18px; border-radius: var(--r-lg); display: flex; align-items: center; gap: 14px; }
  .right .badge { background: #fff; }
  .right .wm { color: #eafff7; }
</style>
</head>
<body>
  <div class="left">
    <div class="badge"><img src="../assets/roomlink-logo.png" alt="RoomLink"></div>
    <div>
      <div class="wm">RoomLink</div>
      <div class="sub">On light · on white plate</div>
    </div>
  </div>
  <div class="right">
    <div class="badge"><img src="../assets/roomlink-logo.png" alt="RoomLink"></div>
    <div>
      <div class="wm">RoomLink</div>
      <div class="sub" style="color:#9bd1c4">On dark · plate stays white</div>
    </div>
  </div>
</body>
</html>
