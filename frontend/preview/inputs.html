<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; display: grid; gap: 14px; grid-template-columns: 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font: var(--t-label); }
  .field .hint  { font: var(--t-small); color: var(--muted); font-size: 12px; }
  input, select, textarea {
    width: 100%;
    height: 44px;
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    background: var(--surface);
    padding: 0 14px;
    font: var(--t-body);
    color: var(--text);
    transition: border-color var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .err input { border-color: var(--danger); }
  .err .hint { color: var(--danger); }
  .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 4px; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-pill); }
  .seg button { height: 36px; border: 0; background: transparent; border-radius: var(--r-pill); font: var(--t-body-strong); font-size: 14px; color: var(--muted); cursor: pointer; }
  .seg button.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow-xs); }
</style>
</head>
<body>
  <div class="field">
    <label for="a">Student Number</label>
    <input id="a" placeholder="Enter your student number" value="20231042">
  </div>
  <div class="field">
    <label for="b">Reservation Date</label>
    <input id="b" type="date" value="2026-05-18">
  </div>
  <div class="field err">
    <label for="c">Password</label>
    <input id="c" type="password" placeholder="Enter your password" value="wrong">
    <span class="hint">Password is incorrect.</span>
  </div>
  <div class="field">
    <label>Login Type</label>
    <div class="seg">
      <button class="active">Student</button>
      <button>Admin / Staff</button>
    </div>
  </div>
</body>
</html>
