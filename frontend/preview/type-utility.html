<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
  .block { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: 14px; }
  .block .k { font: var(--t-label); color: var(--muted); margin-bottom: 8px; }
  .label { font: var(--t-label); }
  .mono { font: var(--t-mono); }
  .eyebrow { color: var(--accent); }
  kbd { background: var(--surface-2); border: 1px solid var(--line); border-bottom-width: 2px; border-radius: 6px; padding: 2px 6px; font: var(--t-mono); font-size: 11px; }
</style>
</head>
<body>
  <div class="block">
    <div class="k">Label · Inter 600 · 12</div>
    <div class="label">Reservation Date</div>
  </div>
  <div class="block">
    <div class="k">Eyebrow · 640 · +.08em</div>
    <div class="eyebrow">Authentication</div>
  </div>
  <div class="block">
    <div class="k">Mono · JetBrains Mono</div>
    <div class="mono">RRS-ROOM-104-2DAA</div>
  </div>
  <div class="block">
    <div class="k">Keyboard</div>
    <div><kbd>⌘</kbd> <kbd>K</kbd> open quick reserve</div>
  </div>
</body>
</html>
