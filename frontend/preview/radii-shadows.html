<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .col h4 { font: var(--t-label); color: var(--muted); margin-bottom: 12px; }
  .radii { display: flex; gap: 12px; align-items: flex-end; }
  .ra { display: flex; flex-direction: column; align-items: center; gap: 6px; font: var(--t-mono); font-size: 10px; color: var(--muted); }
  .ra .box { width: 56px; height: 56px; background: var(--accent-tint); border: 1px solid var(--accent-line); }
  .ra:nth-child(1) .box { border-radius: var(--r-xs); }
  .ra:nth-child(2) .box { border-radius: var(--r-sm); }
  .ra:nth-child(3) .box { border-radius: var(--r-md); }
  .ra:nth-child(4) .box { border-radius: var(--r-lg); }
  .ra:nth-child(5) .box { border-radius: var(--r-xl); }
  .ra:nth-child(6) .box { border-radius: var(--r-pill); }

  .shadows { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sh { background: #fff; border-radius: var(--r-md); height: 64px; display: flex; align-items: center; justify-content: center; font: var(--t-mono); font-size: 10px; color: var(--muted); }
  .sh.xs { box-shadow: var(--shadow-xs); }
  .sh.sm { box-shadow: var(--shadow-sm); }
  .sh.md { box-shadow: var(--shadow-md); }
  .sh.lg { box-shadow: var(--shadow-lg); }
</style>
</head>
<body>
  <div class="col">
    <h4>Radii</h4>
    <div class="radii">
      <div class="ra"><div class="box"></div><span>xs · 6</span></div>
      <div class="ra"><div class="box"></div><span>sm · 10</span></div>
      <div class="ra"><div class="box"></div><span>md · 14</span></div>
      <div class="ra"><div class="box"></div><span>lg · 20</span></div>
      <div class="ra"><div class="box"></div><span>xl · 28</span></div>
      <div class="ra"><div class="box"></div><span>pill</span></div>
    </div>
  </div>
  <div class="col">
    <h4>Shadows</h4>
    <div class="shadows">
      <div class="sh xs">xs</div>
      <div class="sh sm">sm</div>
      <div class="sh md">md</div>
      <div class="sh lg">lg</div>
    </div>
  </div>
</body>
</html>
