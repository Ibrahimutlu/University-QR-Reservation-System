<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 22px; display: grid; gap: 14px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .btn { border: 0; min-height: 40px; padding: 0 18px; border-radius: 8px; font: var(--t-body-strong); font-size: 0.9rem; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out), background var(--dur-base) var(--ease-out); }
  .primary   { background: var(--accent); color: var(--on-accent); box-shadow: var(--shadow-glow); }
  .secondary { background: var(--surface); color: var(--text); border: 1px solid var(--line); box-shadow: var(--shadow-xs); }
  .ghost     { background: transparent; color: var(--text); }
  .danger    { background: var(--danger); color: #fff; }
  .square    { border-radius: 6px; }
  .icon-only { width: 40px; padding: 0; justify-content: center; }
  .sm  { min-height: 32px; padding: 0 12px; font-size: 0.82rem; border-radius: 6px; }
  .lg  { min-height: 48px; padding: 0 22px; font-size: 0.95rem; border-radius: 10px; }
  .label { font: var(--t-label); color: var(--muted); width: 80px; }
  .group { display: flex; align-items: center; gap: 14px; }
</style>
</head>
<body>
  <div class="group"><span class="label">Primary</span>
    <div class="row">
      <button class="btn primary">Submit Reservation</button>
      <button class="btn primary">Browse Rooms</button>
      <button class="btn primary sm">Save</button>
      <button class="btn primary lg">Reserve a Room</button>
    </div>
  </div>
  <div class="group"><span class="label">Secondary</span>
    <div class="row">
      <button class="btn secondary">Back to Rooms</button>
      <button class="btn secondary">Logout</button>
      <button class="btn secondary icon-only" aria-label="QR"><i data-lucide="qr-code" width="18" height="18"></i></button>
      <button class="btn ghost">Reset</button>
    </div>
  </div>
  <div class="group"><span class="label">Danger</span>
    <div class="row">
      <button class="btn danger">Delete Room</button>
      <button class="btn danger">Cancel Reservation</button>
      <button class="btn primary" disabled style="opacity:.52">Loading…</button>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
