<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; }
  .stack { display: grid; gap: 8px; }
  .display { font-size: 64px; }
  .sub { font: var(--t-h3); color: var(--muted); font-weight: 400; }
  .tag { font: var(--t-eyebrow); color: var(--accent); letter-spacing: var(--ls-eyebrow); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="stack">
    <span class="tag">Reservation Form</span>
    <div class="display">Reserve a room.</div>
    <p class="sub">Set in <em>Bricolage Grotesque</em> — a modern, expressive geometric sans. Used for hero copy and section breaks.</p>
  </div>
</body>
</html>
