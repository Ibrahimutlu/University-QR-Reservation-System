<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .row .meta { font: var(--t-mono); font-size: 11px; color: var(--muted); width: 80px; }
  .bar { background: var(--accent); height: 14px; border-radius: 4px; }
  .b1  { width: 4px; }
  .b2  { width: 8px; }
  .b3  { width: 12px; }
  .b4  { width: 16px; }
  .b5  { width: 20px; }
  .b6  { width: 24px; }
  .b8  { width: 32px; }
  .b10 { width: 40px; }
  .b12 { width: 48px; }
  .b16 { width: 64px; }
  .b20 { width: 80px; }
</style>
</head>
<body>
  <div class="row"><div class="meta">--s-1 · 4</div><div class="bar b1"></div></div>
  <div class="row"><div class="meta">--s-2 · 8</div><div class="bar b2"></div></div>
  <div class="row"><div class="meta">--s-3 · 12</div><div class="bar b3"></div></div>
  <div class="row"><div class="meta">--s-4 · 16</div><div class="bar b4"></div></div>
  <div class="row"><div class="meta">--s-6 · 24</div><div class="bar b6"></div></div>
  <div class="row"><div class="meta">--s-8 · 32</div><div class="bar b8"></div></div>
  <div class="row"><div class="meta">--s-12 · 48</div><div class="bar b12"></div></div>
  <div class="row"><div class="meta">--s-20 · 80</div><div class="bar b20"></div></div>
</body>
</html>
