<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; display: grid; gap: 12px; }
  .row { display: flex; gap: 14px; align-items: center; }
  .row .label { font: var(--t-label); color: var(--muted); width: 110px; }
  .row .meta  { font: var(--t-mono); font-size: 11px; color: var(--muted); }

  .ease { width: 220px; height: 8px; background: var(--surface-2); border-radius: var(--r-pill); position: relative; overflow: hidden; }
  .ease span { position: absolute; top: 0; left: 0; height: 100%; width: 30px; background: var(--accent); border-radius: var(--r-pill); animation: slide 1.8s infinite; }
  .ease.out span    { animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1); }
  .ease.spring span { animation-timing-function: cubic-bezier(0.18, 0.82, 0.22, 1); }
  .ease.linear span { animation-timing-function: linear; }
  @keyframes slide {
    0%, 10%   { transform: translateX(0); }
    50%, 60%  { transform: translateX(190px); }
    100%      { transform: translateX(0); }
  }

  .btn { padding: 8px 14px; border-radius: var(--r-md); background: var(--accent); color: #fff; border: 0; cursor: pointer; font: var(--t-body-strong); font-size: 14px; box-shadow: var(--shadow-glow); transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out); }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 14px 32px var(--accent-glow); }
  .btn:active { transform: translateY(1px) scale(0.985); }
</style>
</head>
<body>
  <div class="row"><span class="label">--ease-out</span><div class="ease out"><span></span></div><span class="meta">cubic-bezier(.22,.61,.36,1)</span></div>
  <div class="row"><span class="label">--ease-spring</span><div class="ease spring"><span></span></div><span class="meta">cubic-bezier(.18,.82,.22,1)</span></div>
  <div class="row"><span class="label">linear</span><div class="ease linear"><span></span></div><span class="meta">control / avoid</span></div>
  <div class="row" style="margin-top:6px"><span class="label">Hover & press</span><button class="btn">Hover, then press me</button><span class="meta">220 ms · ripple via motion.js</span></div>
</body>
</html>
