<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | University Room Reservation</title>
    <link rel="stylesheet" href="login.css" />
</head>
<body>
    <div class="page-bg"></div>
    <div id="roomlinkSplash" class="roomlink-splash" aria-hidden="true">
        <div class="roomlink-splash-inner">
            <div class="roomlink-word">
                <span>R</span><span>o</span><span>o</span><span>m</span><span>L</span><span>i</span><span>n</span><span>k</span>
            </div>
            <p>Smart QR Reservation</p>
        </div>
    </div>

    <header class="site-header">
        <div class="container header-container">
            <div class="brand">
                <div class="brand-badge">QR</div>
                <div class="brand-text">
                    <h1>QR-Integrated University Room Reservation System</h1>
                    <p>Login</p>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="login-section">
            <div class="container">
                <div class="login-card">
                    <div class="login-intro">
                        <p class="section-label">Authentication</p>
                        <h2>Sign In</h2>
                        <p class="intro-text">
                            Choose your role and sign in to continue to the reservation system.
                        </p>
                    </div>

                    <div class="auth-mode-switch" role="tablist" aria-label="Login Type">
                        <button type="button" class="auth-mode-btn active" id="studentModeBtn" data-mode="student">Student Login</button>
                        <button type="button" class="auth-mode-btn" id="staffModeBtn" data-mode="staff">Admin / Staff Login</button>
                    </div>

                    <form id="loginForm" novalidate>
                        <div class="form-group" id="studentField">
                            <label for="studentNumber">Student Number</label>
                            <input type="text"
                                   id="studentNumber"
                                   name="studentNumber"
                                   placeholder="Enter your student number"
                                   autocomplete="username"
                                   required />
                            <small class="field-error" id="studentNumberError"></small>
                        </div>

                        <div class="form-group hidden" id="emailField">
                            <label for="email">University Email</label>
                            <input type="email"
                                   id="email"
                                   name="email"
                                   placeholder="name@university.com"
                                   autocomplete="username" />
                            <small class="field-error" id="emailError"></small>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password"
                                   id="password"
                                   name="password"
                                   placeholder="Enter your password"
                                   autocomplete="current-password"
                                   required />
                            <small class="field-error" id="passwordError"></small>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="primary-btn" id="loginBtn">
                                <span class="btn-text">Login</span>
                                <span class="btn-loader hidden"></span>
                            </button>
                        </div>
                    </form>

                    <div id="messageBox" class="message-box hidden">
                        <div class="message-icon" id="messageIcon">!</div>
                        <div class="message-content">
                            <h4 id="messageTitle">Message</h4>
                            <p id="messageText"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>window.RRS_API_BASE = (["localhost","127.0.0.1"].includes(window.location.hostname) ? "http://localhost:5000" : window.location.origin);</script>
    <script src="js/auth.js"></script>
    <script src="login.js"></script>
</body>
</html>
