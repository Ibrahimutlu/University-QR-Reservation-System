<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | University Room Reservation</title>
    <link rel="stylesheet" href="login.css" />
</head>
<body>
    <div class="page-bg"></div>

    <header class="site-header">
        <div class="container header-container">
            <div class="brand">
                <div class="brand-badge">QR</div>
                <div class="brand-text">
                    <h1>QR-Integrated University Room Reservation System</h1>
                    <p>Login</p>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="login-section">
            <div class="container">
                <div class="login-card">
                    <div class="login-intro">
                        <p class="section-label">Authentication</p>
                        <h2>Sign In</h2>
                        <p class="intro-text">
                            Enter your account details to continue to the reservation system.
                        </p>
                    </div>

                    <form id="loginForm" novalidate>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email"
                                   id="email"
                                   name="email"
                                   placeholder="Enter your email"
                                   required />
                            <small class="field-error" id="emailError"></small>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password"
                                   id="password"
                                   name="password"
                                   placeholder="Enter your password"
                                   required />
                            <small class="field-error" id="passwordError"></small>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="primary-btn" id="loginBtn">
                                <span class="btn-text">Login</span>
                                <span class="btn-loader hidden"></span>
                            </button>
                        </div>
                    </form>

                    <div id="messageBox" class="message-box hidden">
                        <div class="message-icon" id="messageIcon">!</div>
                        <div class="message-content">
                            <h4 id="messageTitle">Message</h4>
                            <p id="messageText"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
